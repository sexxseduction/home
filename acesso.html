<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso VIP - Bem-vindo</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0D0D0F;
            --bg-sec: #16161A;
            --primary: #9D00FF;
            --primary-hover: #B026FF;
            --accent: #00F0FF;
            --text-main: #FFFFFF;
            --text-sec: #B5B5B5;
            --text-muted: #6E6E73;
            --glow: 0 0 30px rgba(157, 0, 255, 0.5);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://i.ibb.co/xqJ3DVhG/acapa.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 600px;
            padding: 3rem 1rem;
            background: rgba(13, 13, 15, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 2rem auto;
        }

        /* Original Size Image */
        .main-photo {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: var(--glow);
            margin-bottom: 2rem;
            border: 2px solid var(--primary);
        }

        /* Content */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            line-height: 1.1;
        }

        .hot-copy {
            font-size: 1.2rem;
            color: var(--text-sec);
            margin-bottom: 2.5rem;
            font-weight: 400;
            padding: 0 1rem;
        }

        .hot-copy span {
            color: #fff;
            font-weight: 700;
            display: block;
            margin-top: 1rem;
            font-size: 1.3rem;
        }

        /* CTA Button */
        .cta-btn {
            display: block;
            background: var(--primary);
            color: #fff;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--glow);
            transition: var(--transition);
            border: none;
            cursor: pointer;
            text-decoration: none;
            margin: 0 auto 2rem;
            max-width: 400px;
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--primary-hover);
            box-shadow: 0 0 60px rgba(157, 0, 255, 0.8);
        }

        /* Footer Info */
        .secure-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .hot-copy {
                font-size: 1.1rem;
            }

            .cta-btn {
                font-size: 1.2rem;
            }

            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Main Photo Original Size -->
        <img src="https://i.ibb.co/Pz3Vbs7b/m-IA.png" alt="Dona da Área VIP" class="main-photo">

        <!-- Copy -->
        <h1>Bem-vindo!<br>Agora é hora de aproveitar...</h1>

        <p class="hot-copy">
            Você acaba de dar o passo mais importante. Aqui dentro, as regras não existem. Preparei algo que vai fazer
            você esquecer de tudo lá fora.
            <span>O acesso ao Grupo VIP está liberado agora...</span>
        </p>

        <!-- CTA Button -->
        <a href="https://t.me/seu_link_do_grupo" class="cta-btn" id="cta">QUERO ACESSAR AGORA 🔥</a>

        <!-- Security Footer -->
        <div class="secure-info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
            </svg>
            Conexão Privada e Site Protegido.
        </div>

    </div>

</body>

</html>
